version: '3'

tasks:
  build:
    desc: Build the weft-network binary
    cmds:
      - go build -ldflags "-X main.version={{.VERSION}} -X main.commit={{.COMMIT}} -X main.date={{.DATE}}" -o weft-network ./cmd/weft-network
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo dev
      COMMIT:
        sh: git rev-parse --short HEAD 2>/dev/null || echo none
      DATE:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ

  test:
    desc: Run all Go tests
    cmds:
      - go test ./... -race

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  check:
    desc: vet + test
    deps: [vet, test]

  tidy:
    desc: go mod tidy
    cmds:
      - go mod tidy

  cross:
    desc: Cross-compile for the production targets (linux arm64 + amd64)
    cmds:
      - GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o weft-network-linux-arm64 ./cmd/weft-network
      - GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o weft-network-linux-amd64 ./cmd/weft-network
