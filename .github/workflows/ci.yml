name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # weft-network depends on the sibling weft-network-proto module via
      # a `replace` directive ; CI clones it alongside.
      - name: Checkout weft-network-proto
        uses: actions/checkout@v4
        with:
          repository: openweft/weft-network-proto
          path: ../weft-network-proto

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -race -count=1

  cross:
    name: cross-compile (linux arm64 + amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout weft-network-proto
        uses: actions/checkout@v4
        with:
          repository: openweft/weft-network-proto
          path: ../weft-network-proto
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Cross-compile
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o /tmp/weft-network-arm64 ./cmd/weft-network
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o /tmp/weft-network-amd64 ./cmd/weft-network
          file /tmp/weft-network-*

  docker:
    name: docker image build (smoke)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      # weft-network depends on the sibling weft-network-proto module
      # via `replace ../weft-network-proto`. The docker image is built
      # from a vendored tree so it doesn't need network access at
      # `docker build` time + so the replace resolves locally.
      - name: Checkout weft-network-proto (for the replace)
        uses: actions/checkout@v4
        with:
          repository: openweft/weft-network-proto
          path: ../weft-network-proto

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Vendor dependencies
        run: go mod vendor

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: weft-network:ci
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
