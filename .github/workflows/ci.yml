name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # weft-network depends on the sibling weft-network-proto module via
      # a `replace` directive ; CI clones it alongside.
      - name: Checkout weft-network-proto
        uses: actions/checkout@v4
        with:
          repository: openweft/weft-network-proto
          path: ../weft-network-proto

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -race -count=1

  cross:
    name: cross-compile (linux arm64 + amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout weft-network-proto
        uses: actions/checkout@v4
        with:
          repository: openweft/weft-network-proto
          path: ../weft-network-proto
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Cross-compile
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o /tmp/weft-network-arm64 ./cmd/weft-network
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o /tmp/weft-network-amd64 ./cmd/weft-network
          file /tmp/weft-network-*
