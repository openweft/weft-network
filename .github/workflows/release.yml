name: Release

# Tag-driven publish. Pushes to GHCR happen ONLY on a vX.Y.Z tag,
# not on every push to main — see the project memory entry
# "No autopublish during dev" for why.
#
# Trigger :
#   git tag v0.1.0 && git push --tags
# Also exposes a workflow_dispatch knob so the maintainer can
# re-run a publish without re-tagging when GHCR was down.
#
# Supply-chain attestations: each pushed image gets an SPDX 2.3 JSON
# SBOM (Syft) cosign-attested as `spdxjson`, plus a SLSA L3 provenance
# via slsa-framework/slsa-github-generator. See the weft repo's
# docs/operations/cosign-verify.md for verifier commands.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build from (defaults to the current branch).'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # id-token: write is required for keyless cosign + SLSA generator
      # OIDC exchange.
      contents: read
      packages: write
      id-token: write
    outputs:
      image: ${{ env.IMAGE }}
      digest: ${{ steps.build.outputs.digest }}
    env:
      IMAGE: ghcr.io/openweft/weft-network
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0   # so `git describe` works in -ldflags stamps

      # The Dockerfile expects a vendored module tree (see the file's
      # header comment). Pull the sibling proto + vendor before docker
      # build.
      - name: Checkout weft-network-proto (for the replace)
        uses: actions/checkout@v4
        with:
          repository: openweft/weft-network-proto
          path: ../weft-network-proto

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Vendor dependencies
        run: go mod vendor

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version / commit / date
        id: stamps
        run: |
          set -euo pipefail
          VERSION="$(git describe --tags --always --dirty)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          # SOURCE_DATE_EPOCH = commit timestamp of the build ref
          # (reproducible-builds.org convention). Used both as the
          # buildkit env var (rewrites layer mtimes + config `created`)
          # and as a build-arg the Dockerfile can read to drive
          # `go build -trimpath -buildvcs=false -ldflags=-buildid=...`
          # in its build stage. The `date` field below is kept for
          # backward compatibility with the existing `DATE` build-arg
          # but is now derived from SOURCE_DATE_EPOCH so two runs of
          # the same commit produce the same human-readable stamp.
          EPOCH="$(git log -1 --format=%ct "${GITHUB_SHA}")"
          echo "epoch=${EPOCH}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u -d "@${EPOCH}" +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build + push (multi-arch)
        id: build
        uses: docker/build-push-action@v5
        env:
          SOURCE_DATE_EPOCH: ${{ steps.stamps.outputs.epoch }}
        with:
          context: .
          # Multi-arch image — arm64 + amd64 cover the cluster topologies
          # we support. The Dockerfile build is pure-Go CGO=0 so QEMU
          # emulation is fast enough for CI.
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE }}:${{ steps.stamps.outputs.version }}
            ${{ env.IMAGE }}:latest
          build-args: |
            VERSION=${{ steps.stamps.outputs.version }}
            COMMIT=${{ steps.stamps.outputs.commit }}
            DATE=${{ steps.stamps.outputs.date }}
            SOURCE_DATE_EPOCH=${{ steps.stamps.outputs.epoch }}
          # Buildx caches its layers against the previous publish ;
          # speeds up successive tags significantly.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        # Sign the multi-arch manifest digest so the signature stays
        # bound to the bytes even if the tag is later moved.
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - uses: anchore/sbom-action/download-syft@v0

      - name: Generate image SBOM (SPDX 2.3 JSON)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          syft scan "registry:${IMAGE}@${DIGEST}" \
            -o spdx-json=weft-network.spdx.json

      - name: Cosign-attest SBOM (spdxjson predicate)
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign attest --yes \
            --predicate weft-network.spdx.json \
            --type spdxjson \
            "${IMAGE}@${DIGEST}"

      - name: Upload SBOM as workflow artifact
        # No GitHub Release object is created by this workflow (image-only
        # publish), so park the SBOM as a workflow artifact for forensic
        # recall. Verifiers should prefer the cosign attestation above.
        uses: actions/upload-artifact@v4
        with:
          name: weft-network-sbom-${{ steps.stamps.outputs.version }}
          path: weft-network.spdx.json

  provenance:
    # SLSA L3 provenance for the published image. Runs on an isolated
    # ephemeral builder GitHub controls — that's what earns L3 builder
    # identity. Produces an in-toto attestation attached to the
    # registry manifest by digest.
    needs: publish
    permissions:
      contents: read
      packages: write
      id-token: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ghcr.io/openweft/weft-network
      digest: ${{ needs.publish.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
